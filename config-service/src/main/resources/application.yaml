spring:
  application:
    name: config-service
  cloud:
    config:
      server:
        git:
          uri: https://bitbucket.org/springfordev11/lovable-config-server.git
          username: ${GIT_USERNAME}
          password: ${GIT_PASSWORD}
          default-label: main
          clone-on-start: true

server:
  port: 8888

management:
  endpoints:
    web:
      exposure:
        include: health, info